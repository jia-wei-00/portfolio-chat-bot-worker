<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Portfolio Content Manager</title>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				background: #f3f4f6;
				color: #1f2937;
				min-height: 100vh;
			}

			header {
				background: #111827;
				color: white;
				padding: 1rem 2rem;
				display: flex;
				align-items: center;
				justify-content: space-between;
			}

			header h1 { font-size: 1.2rem; font-weight: 600; }
			header span { font-size: 0.85rem; color: #9ca3af; }

			main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

			/* Login */
			#login-screen {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: calc(100vh - 60px);
			}

			.login-card {
				background: white;
				border-radius: 12px;
				padding: 2rem;
				width: 100%;
				max-width: 380px;
				box-shadow: 0 4px 24px rgba(0,0,0,0.08);
			}

			.login-card h2 { margin-bottom: 1.25rem; font-size: 1.1rem; }

			/* Cards */
			.card {
				background: white;
				border-radius: 10px;
				padding: 1.5rem;
				margin-bottom: 1.5rem;
				box-shadow: 0 1px 4px rgba(0,0,0,0.06);
			}

			.card h2 {
				font-size: 1rem;
				font-weight: 600;
				margin-bottom: 1rem;
				color: #374151;
			}

			/* Form */
			.form-row { margin-bottom: 0.85rem; }
			label { display: block; font-size: 0.8rem; font-weight: 500; color: #6b7280; margin-bottom: 0.3rem; }

			input[type="text"],
			input[type="password"],
			select,
			textarea {
				width: 100%;
				padding: 0.6rem 0.75rem;
				border: 1px solid #d1d5db;
				border-radius: 6px;
				font-size: 0.9rem;
				font-family: inherit;
				transition: border-color 0.15s;
				background: white;
			}

			input:focus, select:focus, textarea:focus {
				outline: none;
				border-color: #6366f1;
				box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
			}

			textarea { resize: vertical; min-height: 100px; }

			.btn-row { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }

			button {
				padding: 0.55rem 1.1rem;
				border: none;
				border-radius: 6px;
				font-size: 0.875rem;
				font-weight: 500;
				cursor: pointer;
				transition: opacity 0.15s;
			}

			button:disabled { opacity: 0.5; cursor: not-allowed; }

			.btn-primary { background: #6366f1; color: white; }
			.btn-primary:hover:not(:disabled) { background: #4f46e5; }

			.btn-secondary { background: #e5e7eb; color: #374151; }
			.btn-secondary:hover:not(:disabled) { background: #d1d5db; }

			.btn-danger { background: #fee2e2; color: #dc2626; font-size: 0.8rem; padding: 0.3rem 0.65rem; }
			.btn-danger:hover:not(:disabled) { background: #fecaca; }

			/* Document list */
			.doc-list { display: flex; flex-direction: column; gap: 0.5rem; }

			.doc-item {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0.75rem 1rem;
				border: 1px solid #e5e7eb;
				border-radius: 8px;
				gap: 1rem;
			}

			.doc-item:hover { background: #f9fafb; }

			.doc-info { flex: 1; min-width: 0; }
			.doc-title { font-weight: 500; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
			.doc-meta { font-size: 0.75rem; color: #9ca3af; margin-top: 0.15rem; }

			.badge {
				display: inline-block;
				padding: 0.15rem 0.5rem;
				border-radius: 999px;
				font-size: 0.7rem;
				font-weight: 500;
				background: #e0e7ff;
				color: #4338ca;
				white-space: nowrap;
			}

			/* Status messages */
			.status {
				padding: 0.6rem 0.9rem;
				border-radius: 6px;
				font-size: 0.85rem;
				margin-top: 0.75rem;
				display: none;
			}

			.status.success { background: #d1fae5; color: #065f46; display: block; }
			.status.error   { background: #fee2e2; color: #991b1b; display: block; }
			.status.info    { background: #e0e7ff; color: #3730a3; display: block; }

			#doc-count { color: #9ca3af; font-weight: 400; font-size: 0.85rem; }

			.empty { text-align: center; padding: 2rem; color: #9ca3af; font-size: 0.9rem; }
		</style>
	</head>
	<body>
		<header>
			<h1>Portfolio Content Manager</h1>
			<span id="header-status"></span>
		</header>

		<!-- Login -->
		<div id="login-screen">
			<div class="login-card">
				<h2>Enter admin token</h2>
				<div class="form-row">
					<label>Admin Token</label>
					<input type="password" id="token-input" placeholder="Your SEED_SECRET" autocomplete="current-password" />
				</div>
				<div class="btn-row">
					<button class="btn-primary" id="login-btn">Login</button>
				</div>
				<div id="login-status" class="status"></div>
			</div>
		</div>

		<!-- Admin panel (hidden until logged in) -->
		<main id="admin-panel" style="display:none">

			<!-- Add document -->
			<div class="card">
				<h2>Add Document</h2>
				<div class="form-row">
					<label>Title</label>
					<input type="text" id="doc-title" placeholder="e.g. About Me" />
				</div>
				<div class="form-row">
					<label>Category</label>
					<select id="doc-category">
						<option value="about">About</option>
						<option value="skills">Skills</option>
						<option value="projects">Projects</option>
						<option value="experience">Experience</option>
						<option value="education">Education</option>
						<option value="contact">Contact</option>
					</select>
				</div>
				<div class="form-row">
					<label>Content</label>
					<textarea id="doc-content" placeholder="Describe this section of your portfolio…"></textarea>
				</div>
				<div class="btn-row">
					<button class="btn-primary" id="add-btn">Add Document</button>
					<button class="btn-secondary" id="seed-btn">Load Defaults from data.ts</button>
				</div>
				<div id="add-status" class="status"></div>
			</div>

			<!-- Document list -->
			<div class="card">
				<h2>Documents <span id="doc-count"></span></h2>
				<div id="doc-list" class="doc-list">
					<div class="empty">Loading…</div>
				</div>
				<div id="list-status" class="status"></div>
			</div>

		</main>

		<script src="admin.js"></script>
	</body>
</html>
